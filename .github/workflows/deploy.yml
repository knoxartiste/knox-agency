name: Deploy to knoxartiste.agency

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest from GitHub to server
        run: |
          response=$(curl -s -X POST "https://cpl28.main-hosting.eu:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel knoxarti:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/knoxarti/knoxartiste.agency")
          status=$(echo $response | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',0))")
          echo "Update status: $status"
          [ "$status" = "1" ] || exit 1

      - name: Deploy HEAD commit
        run: |
          response=$(curl -s -X POST "https://cpl28.main-hosting.eu:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel knoxarti:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/knoxarti/knoxartiste.agency")
          status=$(echo $response | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',0))")
          echo "Deploy status: $status"
          [ "$status" = "1" ] || exit 1
